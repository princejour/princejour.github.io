<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Official developer page for Walhero Live Wallpaper.">
  <meta name="theme-color" content="#071225">
  <title>Walhero Live Wallpaper</title>
  <style>
    :root{color-scheme:dark;--bg:#050914;--card:#0c1730;--text:#f5f7ff;--muted:#aeb9d3;--cyan:#25d9ff;--purple:#9b5cff}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at top right,#16275a 0,transparent 40%),linear-gradient(145deg,var(--bg),#090d20);color:var(--text);display:grid;place-items:center;padding:24px}
    main{width:min(720px,100%);background:rgba(12,23,48,.88);border:1px solid rgba(105,211,255,.25);border-radius:28px;padding:clamp(28px,6vw,56px);box-shadow:0 24px 80px rgba(0,0,0,.4)}
    .logo{width:76px;height:76px;border-radius:22px;display:grid;place-items:center;font-size:38px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));box-shadow:0 0 34px rgba(37,217,255,.25)}
    h1{font-size:clamp(32px,7vw,54px);line-height:1.05;margin:24px 0 12px}p{color:var(--muted);line-height:1.7;font-size:17px}
    .tag{display:inline-block;margin-top:8px;padding:7px 12px;border-radius:999px;background:rgba(37,217,255,.1);color:var(--cyan);font:600 13px ui-monospace,SFMono-Regular,monospace}
    nav{display:flex;flex-wrap:wrap;gap:12px;margin-top:32px}a{color:#061020;background:var(--cyan);font-weight:750;text-decoration:none;padding:13px 18px;border-radius:14px}a.secondary{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.18)}
    footer{margin-top:38px;padding-top:20px;border-top:1px solid rgba(255,255,255,.09);font-size:13px;color:#8490ad}
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">W</div>
    <h1>Walhero<br>Live Wallpaper</h1>
    <span class="tag">com.walhero.livewallpaper</span>
    <p>Turn a video you choose on your Android device into a looping live wallpaper, with simple local controls for sound and video selection.</p>
    <nav>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a class="secondary" href="https://github.com/princejour">Developer Profile</a>
    </nav>
    <footer>© 2026 Walhero. Official developer website.</footer>
  </main>
</body>
</html>
